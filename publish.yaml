# publish.yaml — manifest for Scripts/publish_to_wiki.py
#
# Bump `revision` (and `revision_date` if you want to override today) when
# cutting a new locked version, then run:
#   python Scripts/publish_to_wiki.py            # update wiki working copy
#   python Scripts/publish_to_wiki.py --pdf      # also render PDFs to releases/Rev<rev>/
#
# The wiki repository is expected to be checked out next to this repo at
# ../APPN-Aerial-Standard-Operating-Procedures.wiki (override with --wiki-path).

revision: "1.0"
# revision_date: "2026-04-25"   # uncomment to pin; defaults to today (UTC)

repo_url: "https://github.com/ArdenB/APPN-Aerial-Standard-Operating-Procedures"
default_branch: "main"

categories:
