    title: "Sensor Fieldbooks"
  - id: FlightDesign
    title: "Flight Design"
  - id: QA
    title: "Quality Assurance"
  - id: PlotProtocols
    title: "Plot Protocols"
  - id: DataManagement
    title: "Data Management"
  - id: Pipelines
    title: "Processing & Data Products"
  - id: GroundPlatforms
    title: "Ground-Based Platforms"

